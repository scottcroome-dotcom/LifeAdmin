// CRYPTO ENGINE — AES-256-GCM + PBKDF2 — 100% native Web Crypto API
// Nothing leaves the device. Deal Finder sends only item name + category.
// ═══════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = "la_vault_v2";
const HINT_KEY    = "la_hint_v2";

async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const km  = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:310000, hash:"SHA-256" },
    km,
    { name:"AES-GCM", length:256 },
    false,
    ["encrypt","decrypt"]
  );
}
async function encryptData(data, pp) {
  const salt = crypto.getRandomValues(new Uint8Array(32));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(pp, salt);
  const enc  = new TextEncoder();
  const ct   = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, enc.encode(JSON.stringify(data)));
  const out  = new Uint8Array(32+12+ct.byteLength);
  out.set(salt,0); out.set(iv,32); out.set(new Uint8Array(ct),44);
  return btoa(String.fromCharCode(...out));
}
async function decryptData(encoded, pp) {
  try {
    const raw = new Uint8Array(atob(encoded).split("").map(c=>c.charCodeAt(0)));
    const key = await deriveKey(pp, raw.slice(0,32));
    const pt  = await crypto.subtle.decrypt({name:"AES-GCM",iv:raw.slice(32,44)}, key, raw.slice(44));
    return JSON.parse(new TextDecoder().decode(pt));
  } catch { return null; }
}

// LOCK SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function LockScreen({onUnlock,hasVault}) {
  const [pass,setPass]       = useState("");
  const [pass2,setPass2]     = useState("");
  const [hint,setHint]       = useState("");
  const [error,setError]     = useState("");
  const [loading,setLoading] = useState(false);
  const [showHint,setShowHint] = useState(false);
  const storedHint = localStorage.getItem(HINT_KEY)||"";

  const submit = async () => {
    if(!pass) return;
    if(!hasVault) {
      if(pass.length<8){setError("Passphrase must be at least 8 characters");return;}
      if(pass!==pass2){setError("Passphrases don't match");return;}
    }
    setLoading(true); setError("");
    if(hasVault) {
      const raw = localStorage.getItem(STORAGE_KEY);
      const d   = await decryptData(raw, pass);
      if(!d){setError("Wrong passphrase — try again");setLoading(false);return;}
      onUnlock(d, pass);
    } else {
      if(hint) localStorage.setItem(HINT_KEY, hint);
      onUnlock(null, pass);
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#09090b",display:"flex",alignItems:"center",justifyContent:"center",padding:"1.25rem",fontFamily:"'Syne',sans-serif"}}>
      <div style={{width:"100%",maxWidth:"380px"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:"60px",height:"60px",background:"rgba(124,157,255,0.12)",border:"1px solid rgba(124,157,255,0.25)",borderRadius:"16px",marginBottom:"1rem"}}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7c9dff" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h1 style={{fontSize:"1.6rem",fontWeight:800,color:"#e8eaf0",letterSpacing:"-0.04em",margin:0}}>
            <span style={{color:"#7c9dff"}}>life</span>admin
          </h1>
          <p style={{color:"#6b7280",fontSize:"0.82rem",marginTop:"0.35rem"}}>
            {hasVault?"Your vault is locked":"Create your encrypted vault"}
          </p>
        </div>

        <div style={{background:"#16181c",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"16px",padding:"1.5rem"}}>
          <Field label={hasVault?"Passphrase":"Create Passphrase"}>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder={hasVault?"Enter passphrase…":"Min. 8 characters…"}
              style={{...iS,borderRadius:"10px",padding:"0.8rem 1rem"}} autoFocus/>
          </Field>
          {!hasVault && <>
            <Field label="Confirm Passphrase">
              <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Repeat passphrase…"
                style={{...iS,borderRadius:"10px",padding:"0.8rem 1rem"}}/>
            </Field>
            <Field label="Hint (optional — stored unencrypted)">
              <input value={hint} onChange={e=>setHint(e.target.value)} placeholder="Something only you'd know…"
                style={{...iS,borderRadius:"10px",padding:"0.8rem 1rem"}}/>
            </Field>
          </>}

          {error && <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"8px",padding:"0.6rem 0.9rem",color:"#f87171",fontSize:"0.82rem",marginBottom:"0.9rem"}}>{error}</div>}

          <button onClick={submit} disabled={loading}
            style={{width:"100%",background:"#7c9dff",border:"none",borderRadius:"10px",padding:"0.85rem",color:"#fff",fontWeight:800,fontFamily:"inherit",fontSize:"1rem",cursor:"pointer",opacity:loading?0.7:1}}>
            {loading?"Unlocking…":hasVault?"Unlock Vault":"Create Vault"}
          </button>

          {hasVault&&storedHint&&(
            <div style={{marginTop:"0.9rem",textAlign:"center"}}>
              <button onClick={()=>setShowHint(h=>!h)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:"0.78rem"}}>
                {showHint?"Hide hint":"Show hint"}
              </button>
              {showHint&&<p style={{color:"#9ca3af",fontSize:"0.8rem",marginTop:"0.4rem"}}>💡 {storedHint}</p>}
            </div>
          )}
        </div>

        <div style={{marginTop:"1.25rem",display:"flex",gap:"0.5rem",alignItems:"flex-start",padding:"0.85rem 1rem",background:"rgba(74,222,128,0.05)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:"10px"}}>
          <Icon name="shield" size={14} style={{flexShrink:0,marginTop:"2px",color:"#4ade80"}}/>
          <p style={{margin:0,fontSize:"0.73rem",color:"#6b7280",lineHeight:1.6}}>
            <strong style={{color:"#9ca3af"}}>AES-256-GCM</strong> encryption · <strong style={{color:"#9ca3af"}}>PBKDF2</strong> key derivation (310k iterations) · <strong style={{color:"#9ca3af"}}>Zero network activity</strong>. Your data never leaves this device.
          </p>
        </div>
      </div>
    </div>
  );
}

// BANK IMPORT
// ═══════════════════════════════════════════════════════════════════════════
function BankImport({onImport,onClose}) {
  const [rows,setRows]         = useState([]);
  const [detected,setDetected] = useState([]);
  const [step,setStep]         = useState(1);
  const ref = useRef();

  const parseCSV = txt => {
    const lines = txt.trim().split("\n").filter(l=>l.trim());
    if(lines.length<2) return [];
    const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
    return lines.slice(1).map(line=>{
      const vals=line.split(",").map(v=>v.replace(/"/g,"").trim());
      const obj={}; headers.forEach((h,i)=>obj[h]=vals[i]||""); return obj;
    });
  };

  const handleFile = e => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=parseCSV(ev.target.result);
      setRows(parsed);
      const counts={};
      parsed.forEach(r=>{
        const desc=(r.description||r.narrative||r.details||r.payee||"").toLowerCase();
        if(desc) counts[desc]=(counts[desc]||0)+1;
      });
      setDetected(Object.entries(counts).filter(([,c])=>c>=2).map(([name])=>({name,selected:true,category:"Entertainment"})));
      setStep(2);
    };
    reader.readAsText(file);
  };

  return (
    <Modal title="Import Bank CSV" onClose={onClose}>
      {step===1&&<div style={{textAlign:"center",padding:"1rem 0"}}>
        <div style={{fontSize:"2.5rem",marginBottom:"0.75rem"}}>🏦</div>
        <p style={{color:T.muted,fontSize:"0.85rem",marginBottom:"1.25rem",lineHeight:1.7}}>
          Export a CSV from your bank app and upload it here.<br/>
          <strong style={{color:T.text}}>Everything stays on your device.</strong>
        </p>
        <div style={{background:T.bg,border:`2px dashed ${T.border}`,borderRadius:"12px",padding:"1.75rem",cursor:"pointer"}} onClick={()=>ref.current.click()}>
          <Icon name="upload" size={24}/>
          <div style={{color:T.muted,fontSize:"0.85rem",marginTop:"0.6rem"}}>Tap to choose CSV file</div>
        </div>
        <input ref={ref} type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/>
        <p style={{marginTop:"0.75rem",fontSize:"0.72rem",color:T.muted}}>Monzo · Starling · HSBC · Barclays · Lloyds · NatWest · Santander</p>
      </div>}
      {step===2&&<div>
        <p style={{color:T.muted,fontSize:"0.84rem",marginBottom:"0.9rem"}}>{rows.length} transactions · {detected.length} recurring detected</p>
        <div style={{display:"flex",flexDirection:"column",gap:"0.4rem",marginBottom:"1rem",maxHeight:"250px",overflow:"auto"}}>
          {detected.map((r,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:"0.7rem",background:T.bg,borderRadius:"8px",padding:"0.6rem 0.8rem",border:`1px solid ${r.selected?T.accent:T.border}`}}>
              <input type="checkbox" checked={r.selected} onChange={()=>setDetected(d=>d.map((x,j)=>j===i?{...x,selected:!x.selected}:x))} style={{accentColor:T.accent,width:"16px",height:"16px"}}/>
              <span style={{flex:1,fontSize:"0.875rem",textTransform:"capitalize"}}>{r.name}</span>
              <select value={r.category} onChange={e=>setDetected(d=>d.map((x,j)=>j===i?{...x,category:e.target.value}:x))}
                style={{...iS,width:"auto",padding:"3px 6px",fontSize:"0.75rem"}}>
                {["Entertainment","Shopping","Utilities","Storage","Productivity","Health","Finance","Other"].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          ))}
          {!detected.length&&<p style={{color:T.muted,textAlign:"center",padding:"1rem",fontSize:"0.875rem"}}>No recurring transactions found. Try a longer date range export.</p>}
        </div>
        <div style={{display:"flex",gap:"0.6rem"}}>
          <Btn variant="ghost" onClick={()=>setStep(1)}>Back</Btn>
          <Btn onClick={()=>{onImport(detected.filter(r=>r.selected));onClose();}}>
            Add {detected.filter(r=>r.selected).length} Subs
          </Btn>
        </div>
      </div>}
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// PRICE HISTORY SPARKLINE
// ═══════════════════════════════════════════════════════════════════════════
function Sparkline({history,current,name}) {
  if(!history||!history.length) return <p style={{color:T.muted,fontSize:"0.8rem"}}>No price history recorded yet.</p>;
  const all=[...history,{date:new Date().toISOString().slice(0,10),cost:current}];
  const max=Math.max(...all.map(h=>h.cost)), min=Math.min(...all.map(h=>h.cost)), range=max-min||1;
  const W=320,H=90,PAD=18;
  const pts=all.map((p,i)=>[PAD+(i/(all.length-1||1))*(W-PAD*2), PAD+(1-(p.cost-min)/range)*(H-PAD*2), p]);
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const delta=all[all.length-1].cost-all[0].cost;
  return (
    <div style={{marginBottom:"0.75rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.72rem",color:T.muted,marginBottom:"0.4rem"}}>
        <span>Price history</span>
        <span style={{color:delta>0?T.critical:delta<0?T.good:T.muted,fontWeight:700}}>{delta>0?"+":""}{fmtCur(delta)} total change</span>
      </div>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",overflow:"visible"}}>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.accent} stopOpacity="0.25"/><stop offset="100%" stopColor={T.accent} stopOpacity="0"/></linearGradient></defs>
        <path d={`${pathD} L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`} fill="url(#sg)"/>
        <path d={pathD} fill="none" stroke={T.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map(([x,y,p],i)=>(
          <g key={i}>
            <circle cx={x} cy={y} r="3.5" fill={T.accent} stroke={T.surface} strokeWidth="2"/>
            <text x={x} y={y-9} textAnchor="middle" fontSize="9" fill={T.muted}>{fmtCur(p.cost)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

// DOC ATTACHER
// ═══════════════════════════════════════════════════════════════════════════
function DocAttacher({attachments=[],onChange}) {
  const ref=useRef();
  const add=e=>{
    const file=e.target.files[0]; if(!file) return;
    if(file.size>5*1024*1024){alert("Max 5MB");return;}
    const reader=new FileReader();
    reader.onload=ev=>onChange([...attachments,{name:file.name,type:file.type,data:ev.target.result,addedAt:new Date().toISOString()}]);
    reader.readAsDataURL(file);
  };
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginBottom:attachments.length?"0.5rem":0}}>
        {attachments.map((a,i)=>(
          <div key={i} style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:"8px",padding:"0.35rem 0.7rem",display:"flex",alignItems:"center",gap:"0.4rem",fontSize:"0.75rem"}}>
            <Icon name="file" size={12}/><span>{a.name}</span>
            <button onClick={()=>onChange(attachments.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.critical,cursor:"pointer",padding:"0 2px",fontSize:"1rem",lineHeight:1}}>×</button>
          </div>
        ))}
      </div>
      <button onClick={()=>ref.current.click()}
        style={{background:"none",border:`1px dashed ${T.border}`,borderRadius:"8px",padding:"0.5rem 0.85rem",color:T.muted,cursor:"pointer",fontSize:"0.8rem",display:"flex",alignItems:"center",gap:"0.4rem",fontFamily:"'Syne',sans-serif"}}>
        <Icon name="upload" size={13}/> Attach document (encrypted)
      </button>
      <input ref={ref} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={add}/>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [locked,setLocked]     = useState(true);
  const [passphrase,setPP]     = useState("");
  const [data,setData]         = useState(null);
  const [view,setView]         = useState("dashboard");
  const [dealItem,setDealItem] = useState(null);
  const [modal,setModal]       = useState(null);
  const [form,setForm]         = useState({});
  const [showImport,setShowImport] = useState(false);
  const [showMore,setShowMore] = useState(false);
  const [saving,setSaving]     = useState(false);
  const hasVault = !!localStorage.getItem(STORAGE_KEY);
  const saveTimer = useRef(null);

  // Auto-save encrypted
  const persist = useCallback(async(d,pp)=>{
    if(!pp||!d) return;
    setSaving(true);
    localStorage.setItem(STORAGE_KEY, await encryptData(d,pp));
    setSaving(false);
  },[]);

  useEffect(()=>{
    if(!data||!passphrase) return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>persist(data,passphrase),800);
  },[data,passphrase,persist]);

  const unlock = (d,pp)=>{ setPP(pp); setData(d||SEED); setLocked(false); };
  const lock   = ()=>{ setLocked(true); setData(null); setPP(""); };
  const upd    = fn => setData(d=>fn({...d}));
  const updF   = (k,v) => setForm(f=>({...f,[k]:v}));

  if(locked) return <LockScreen onUnlock={unlock} hasVault={hasVault}/>;
  if(!data)  return null;

  // Computed
  const allAlerts=[
    ...data.subscriptions.map(s=>({...s,kind:"subscription",days:daysUntil(s.renewalDate)})),
    ...data.expiries.map(e=>({...e,kind:"expiry",days:daysUntil(e.expiryDate)})),
    ...data.events.map(e=>({...e,kind:"event",days:daysUntil(e.date)})),
  ].filter(a=>a.days!==null&&a.days<=(data.settings?.notifyDays||60)&&a.days>=-7)
   .sort((a,b)=>a.days-b.days);

  const urgentCount = allAlerts.filter(a=>a.days<=14).length;
  const monthlySubCost = data.subscriptions.reduce((s,sub)=>s+(sub.cycle==="annual"?sub.cost/12:sub.cycle==="quarterly"?sub.cost/3:sub.cost),0);
  const monthlyIncome   = data.finances.filter(f=>f.type==="income").reduce((s,f)=>s+f.amount,0);
  const monthlyExpenses = data.finances.filter(f=>f.type==="expense").reduce((s,f)=>s+f.amount,0);
  const monthlySavings  = data.finances.filter(f=>f.type==="savings").reduce((s,f)=>s+f.amount,0);
  const disposable = monthlyIncome-monthlyExpenses-monthlySavings-monthlySubCost;
  const cur = data.settings?.currency||"£";

  // CRUD helpers
  const openAdd  = type => { setForm({}); setModal({type,item:null}); };
  const openEdit = (type,item) => { setForm({...item}); setModal({type,item}); };
  const closeModal = () => setModal(null);
  const saveItem = col => {
    upd(d=>{
      const items=d[col];
      if(modal.item) return {...d,[col]:items.map(i=>i.id===modal.item.id?{...i,...form}:i)};
      return {...d,[col]:[...items,{...form,id:Math.max(0,...items.map(i=>i.id))+1}]};
    });
    closeModal();
  };
  const del = (col,id) => upd(d=>({...d,[col]:d[col].filter(i=>i.id!==id)}));

  // Export / Import
  const exportVault = async()=>{
    const enc=localStorage.getItem(STORAGE_KEY); if(!enc) return;
    const blob=new Blob([enc],{type:"application/octet-stream"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`lifeadmin-${new Date().toISOString().slice(0,10)}.vault`; a.click(); URL.revokeObjectURL(url);
  };
  const importRef=useRef();
  const importVault=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const d=await decryptData(ev.target.result,passphrase);
      if(!d){alert("Wrong passphrase or invalid file.");return;}
      setData(d); alert("Vault restored.");
    };
    reader.readAsText(file);
  };

  const handleBankImport=subs=>{
    upd(d=>{
      const newSubs=subs.map((s,i)=>({id:Math.max(0,...d.subscriptions.map(x=>x.id))+i+1,name:s.name.charAt(0).toUpperCase()+s.name.slice(1),category:s.category,cost:0,cycle:"monthly",renewalDate:"",notes:"Imported from bank",autoRenew:true,priceHistory:[]}));
      return {...d,subscriptions:[...d.subscriptions,...newSubs]};
    });
  };

  // Handle "more" tab
  const handleSetView = v => {
    if(v==="more"){ setShowMore(true); return; }
    setView(v);
  };

  // ── VIEWS ──────────────────────────────────────────────
  const card=(children,sx={})=>(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:"12px",padding:"1rem 1.1rem",...sx}}>{children}</div>
  );
  const sectionLabel=txt=><p style={{margin:"0 0 0.5rem",fontSize:"0.68rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em",color:T.muted}}>{txt}</p>;

  );

  const views = {dashboard:<Dashboard/>,subscriptions:<Subscriptions/>,expiries:<Expiries/>,alerts:<Alerts/>,events:<Events/>,finances:<Finances/>,family:<Family/>,settings:<Settings/>};
  const viewTitles = {dashboard:"Overview",subscriptions:"Subscriptions",expiries:"Expiry Tracker",alerts:"Alerts",events:"Events",finances:"Finances",family:"Family",settings:"Settings"};

  return (
    <>
      {/* Header */}
      <header style={{background:T.surface,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:200,paddingTop:"env(safe-area-inset-top)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1rem",height:"50px"}}>
          <div style={{fontWeight:800,fontSize:"1.05rem",letterSpacing:"-0.03em"}}>
            <span style={{color:T.accent}}>life</span>admin
            {saving&&<span style={{fontSize:"0.62rem",color:T.muted,marginLeft:"0.5rem",fontWeight:400}}>saving…</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
            <span style={{fontSize:"0.78rem",color:T.muted,fontWeight:600}}>{viewTitles[view]||""}</span>
            <button onClick={lock} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:"7px",padding:"0.28rem 0.55rem",color:T.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:"0.3rem",fontSize:"0.72rem",fontFamily:"'Syne',sans-serif"}}>
              <Icon name="lock" size={11}/> Lock
            </button>
          </div>
        </div>
      </header>

      {/* Content */}
      <main style={{padding:"1rem 1rem 5.5rem",maxWidth:"600px",margin:"0 auto"}} key={view} className="fade">
        {views[view]||<Dashboard/>}
      </main>

      {/* Bottom Nav */}
      <BottomNav view={view} setView={handleSetView} urgentCount={urgentCount}/>

      {/* More Menu */}
      {showMore&&<MoreMenu setView={v=>{setView(v);}} onClose={()=>setShowMore(false)}/>}

      {/* Modals */}
      {modal?.type==="subscriptions"&&<SubModal/>}
      {modal?.type==="expiries"&&<ExpModal/>}
      {modal?.type==="events"&&<EventModal/>}
      {modal?.type==="finances"&&<FinanceModal/>}
      {modal?.type==="family"&&<FamilyModal/>}
      {dealItem&&<DealFinder item={dealItem} onClose={()=>setDealItem(null)}/>}
      {showImport&&<BankImport onImport={handleBankImport} onClose={()=>setShowImport(false)}/>}
    </>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: "2rem", color: "#f87171", fontFamily: "'Syne', sans-serif", background: "#09090b", minHeight: "100vh" }}>
          <h2 style={{marginTop: "2rem", fontWeight: 800}}>App Crashed</h2>
          <p style={{ fontSize: "0.85rem", background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", padding: "1rem", borderRadius: "10px", wordBreak: "break-word", lineHeight: 1.5 }}>
            {this.state.error.toString()}
          </p>
          <button
            onClick={() => { localStorage.clear(); window.location.reload(); }}
            style={{ marginTop: "1.5rem", padding: "0.85rem", background: "#7c9dff", color: "#fff", border: "none", borderRadius: "10px", fontWeight: "bold", width: "100%", fontSize: "1rem" }}>
            Clear Local Data & Restart
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
        
  </script>

  <!-- Service Worker registration (PWA offline support) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
